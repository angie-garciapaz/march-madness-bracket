<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>10 Team Double Elimination</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --border: #1e2d45;
      --line: #2a3f5f;
      --text: #e2e8f0;
      --muted: #64748b;
      --gold: #fbbf24;
      --winners: #f97316;
      --losers: #3b82f6;
      --champ: #a855f7;
      --win-color: #4ade80;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: auto;
    }

    header {
      text-align: center;
      padding: 36px 20px 20px;
    }

    header .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--winners);
      margin-bottom: 8px;
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 6vw, 72px);
      letter-spacing: 2px;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 30px;
    }

    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .dot.live { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
    .dot.error { background: #f87171; }

    /* ── Section labels ── */
    .section-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 3px;
      padding: 0 0 16px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
      margin-right: 24px;
    }

    .section-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 40px 24px;
    }

    /* ── Bracket tree layout ── */
    .bracket-area {
      overflow-x: auto;
      padding: 0 24px 20px;
    }

    .bracket-tree {
      display: flex;
      align-items: stretch;
      gap: 0;
      /* enough width so lines don't compress */
    }

    /* Each round column */
    .r-col {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      flex: 0 0 180px;
      position: relative;
    }

    /* ── Team slot (single line) ── */
    .team-slot {
      display: flex;
      align-items: center;
      height: 28px;
      position: relative;
      margin: 2px 0;
    }

    .team-slot .team-line {
      flex: 1;
      height: 28px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      padding: 0 8px;
      background: transparent;
    }

    .team-slot .tname {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
      flex: 1;
    }
    .team-slot .tname.tbd-name { color: var(--muted); font-style: italic; }
    .team-slot .tname.won { color: var(--win-color); font-weight: 700; }

    .team-slot .tscore {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-left: 6px;
      flex-shrink: 0;
    }
    .team-slot .tscore.won { color: var(--win-color); }

    /* matchup = two team slots grouped, with right connector */
    .matchup {
      display: flex;
      flex-direction: column;
      position: relative;
      margin: 0 0 0 0;
    }

    /* vertical line connecting the two teams on the right */
    .matchup::after {
      content: '';
      position: absolute;
      right: 0;
      top: 14px;   /* center of first team */
      height: calc(100% - 28px); /* down to center of second team */
      width: 1px;
      background: var(--line);
    }

    /* horizontal line from midpoint to next column */
    .matchup .connector {
      position: absolute;
      right: -20px;
      top: 50%;
      width: 20px;
      height: 1px;
      background: var(--line);
    }

    /* spacer between matchups to vertically space them */
    .match-spacer {
      flex: 1;
    }

    /* round header */
    .r-header {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      padding-bottom: 12px;
      flex-shrink: 0;
    }

    /* ── Champion block ── */
    .champ-col {
      flex: 0 0 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px 10px;
    }

    .trophy { font-size: 28px; animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-5px); }
    }

    .champ-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
    }

    .champ-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 2px;
      color: var(--gold);
      text-align: center;
      min-height: 22px;
    }

    .no-data {
      color: var(--muted);
      font-size: 12px;
      padding: 20px 0;
      font-style: italic;
    }
  </style>
</head>
<body>

<header>
  <div class="eyebrow">Double Elimination</div>
  <h1>10 Team Tournament</h1>
</header>

<div class="status-bar">
  <div class="dot" id="api-dot"></div>
  <span id="api-status-text">Loading bracket...</span>
</div>

<div class="section-label" style="color:var(--winners)">🟠 Winner's Bracket</div>
<div class="bracket-area">
  <div class="bracket-tree" id="winners-bracket"></div>
</div>

<div class="section-divider"></div>

<div class="section-label" style="color:var(--losers)">🔵 Loser's Bracket</div>
<div class="bracket-area">
  <div class="bracket-tree" id="losers-bracket"></div>
</div>

<div class="section-divider"></div>

<div class="section-label" style="color:var(--champ)">🏆 Championship</div>
<div class="bracket-area">
  <div class="bracket-tree" id="champ-bracket"></div>
</div>

<script>
  const REFRESH_MS = 60 * 1000;

  const WINNERS_ROUNDS = { 1:'Round 1', 2:'Round 2', 3:'Semifinals', 4:"Winner's Final" };
  const LOSERS_ROUNDS  = { 1:'Round 1', 2:'Round 2', 3:'Round 3',    4:'Round 4', 5:"Loser's Final" };
  const CHAMP_ROUNDS   = { 1:'Grand Final', 2:'If Necessary' };

  async function loadFromSheet() {
    try {
      const res  = await fetch('/.netlify/functions/bracket-ehp');
      const data = await res.json();
      if (data.error) throw new Error(`${data.error.status}: ${data.error.message}`);

      const rows  = data.values || [];
      const start = rows[0]?.[0]?.toLowerCase() === 'bracket' ? 1 : 0;

      const winners = {}, losers = {}, champ = {};

      rows.slice(start).forEach(row => {
        const bracket = (row[0]||'').trim().toLowerCase();
        const round   = parseInt(row[1]);
        const team1   = (row[3]||'').trim();
        const team2   = (row[4]||'').trim();
        const score1  = (row[5]||'').trim();
        const score2  = (row[6]||'').trim();
        const winner  = (row[7]||'').trim();

        if (!round) return;

        const bucket = bracket.includes('winner') ? winners
                : bracket.includes('loser')  ? losers
                        : bracket.includes('champ')  ? champ
                                : null;
        if (!bucket) return;

        if (!bucket[round]) bucket[round] = [];
        bucket[round].push({ team1, team2, score1, score2, winner });
      });

      renderTree('winners-bracket', winners, WINNERS_ROUNDS);
      renderTree('losers-bracket',  losers,  LOSERS_ROUNDS);
      renderChamp('champ-bracket',  champ,   CHAMP_ROUNDS);

      document.getElementById('api-dot').className = 'dot live';
      document.getElementById('api-status-text').textContent = `Live · Last updated ${new Date().toLocaleTimeString()}`;
    } catch(err) {
      document.getElementById('api-dot').className = 'dot error';
      document.getElementById('api-status-text').textContent = `Error: ${err.message}`;
      console.error(err);
    }
  }

  function makeTeamSlot(name, score, isWinner) {
    const slot = document.createElement('div');
    slot.className = 'team-slot';

    const line = document.createElement('div');
    line.className = 'team-line';

    const nameEl = document.createElement('span');
    nameEl.className = 'tname' + (!name ? ' tbd-name' : isWinner ? ' won' : '');
    nameEl.textContent = name || 'TBD';
    line.appendChild(nameEl);

    if (score) {
      const scoreEl = document.createElement('span');
      scoreEl.className = 'tscore' + (isWinner ? ' won' : '');
      scoreEl.textContent = score;
      line.appendChild(scoreEl);
    }

    slot.appendChild(line);
    return slot;
  }

  function renderTree(containerId, roundData, roundNames) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';

    const rounds = Object.keys(roundData).map(Number).sort((a,b) => a - b);
    if (rounds.length === 0) {
      const p = document.createElement('p');
      p.className = 'no-data';
      p.textContent = 'No data yet';
      container.appendChild(p);
      return;
    }

    rounds.forEach((rNum, rIdx) => {
      const col = document.createElement('div');
      col.className = 'r-col';
      col.style.flex = '0 0 190px';

      // Round header
      const hdr = document.createElement('div');
      hdr.className = 'r-header';
      hdr.textContent = roundNames[rNum] || `Round ${rNum}`;
      col.appendChild(hdr);

      // Matches container — use a flex column with space-around
      const matchesWrap = document.createElement('div');
      matchesWrap.style.cssText = 'display:flex;flex-direction:column;flex:1;justify-content:space-around;';

      roundData[rNum].forEach((match, mIdx) => {
        const matchup = document.createElement('div');
        matchup.className = 'matchup';
        matchup.style.position = 'relative';

        const isT1Winner = !!match.winner && match.winner === match.team1;
        const isT2Winner = !!match.winner && match.winner === match.team2;

        matchup.appendChild(makeTeamSlot(match.team1, match.score1, isT1Winner));
        matchup.appendChild(makeTeamSlot(match.team2, match.score2, isT2Winner));

        // connector line to next round (not on last col)
        if (rIdx < rounds.length - 1) {
          const conn = document.createElement('div');
          conn.className = 'connector';
          matchup.appendChild(conn);
        }

        matchesWrap.appendChild(matchup);
      });

      col.appendChild(matchesWrap);
      container.appendChild(col);

      // Gap column for connector lines between rounds
      if (rIdx < rounds.length - 1) {
        const gap = document.createElement('div');
        gap.style.cssText = 'flex:0 0 20px;';
        container.appendChild(gap);
      }
    });
  }

  function renderChamp(containerId, roundData, roundNames) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';

    const rounds = Object.keys(roundData).map(Number).sort((a,b) => a - b);

    rounds.forEach((rNum, rIdx) => {
      const col = document.createElement('div');
      col.className = 'r-col';
      col.style.flex = '0 0 190px';

      const hdr = document.createElement('div');
      hdr.className = 'r-header';
      hdr.textContent = roundNames[rNum] || `Round ${rNum}`;
      col.appendChild(hdr);

      const matchesWrap = document.createElement('div');
      matchesWrap.style.cssText = 'display:flex;flex-direction:column;flex:1;justify-content:space-around;';

      roundData[rNum].forEach(match => {
        const matchup = document.createElement('div');
        matchup.className = 'matchup';
        matchup.style.cssText = 'position:relative;border-left:2px solid var(--champ);padding-left:4px;';

        const isT1Winner = !!match.winner && match.winner === match.team1;
        const isT2Winner = !!match.winner && match.winner === match.team2;

        matchup.appendChild(makeTeamSlot(match.team1, match.score1, isT1Winner));
        matchup.appendChild(makeTeamSlot(match.team2, match.score2, isT2Winner));

        if (rIdx < rounds.length - 1) {
          const conn = document.createElement('div');
          conn.className = 'connector';
          matchup.appendChild(conn);
        }

        matchesWrap.appendChild(matchup);
      });

      col.appendChild(matchesWrap);
      container.appendChild(col);

      if (rIdx < rounds.length - 1) {
        const gap = document.createElement('div');
        gap.style.cssText = 'flex:0 0 20px;';
        container.appendChild(gap);
      }
    });

    // Champion display
    const lastRound = rounds[rounds.length - 1];
    const champName = lastRound ? (roundData[lastRound][0]?.winner || '—') : '—';

    const champCol = document.createElement('div');
    champCol.className = 'champ-col';
    champCol.innerHTML = `
    <div class="trophy">🏆</div>
    <div class="champ-label">Tournament<br>Champion</div>
    <div class="champ-name">${champName}</div>
  `;
    container.appendChild(champCol);
  }

  loadFromSheet();
  setInterval(loadFromSheet, REFRESH_MS);
</script>
</body>
</html>
